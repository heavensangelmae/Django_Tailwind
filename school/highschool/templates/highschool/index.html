<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Image</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-lg shadow-md w-96">

<h2 class="text-2xl font-bold mb-6 text-center">Upload Image</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">

<!-- Title -->
<label class="block mb-2 font-semibold">Title</label>
<input type="text" name="title" 
class="w-full border rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400">

<!-- Description -->
<label class="block mb-2 font-semibold">Description</label>
<textarea name="description" rows="3"
class="w-full border rounded-lg p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>

<!-- Choose File -->
<label class="block mb-2 font-semibold">Choose Image</label>
<input type="file" name="image"
class="w-full mb-4">

<!-- Submit -->
<button type="submit"
class="w-full bg-black text-white p-2 rounded-lg hover:bg-gray-800">
Submit
</button>

</form>

</div>

</body>
</html>
